{% extends "base.html" %}
{% set title = "Регистрация — Студия красоты" %}
{% block content %}
<div class="grid">
  <div class="col-12 card" style="max-width:460px;margin:0 auto">
    <h2 style="margin-top:0">Регистрация</h2>
    {% if error %}
      <p style="color:#ff8a8a;margin-top:0">&#9888; {{ error }}</p>
    {% endif %}
    <form method="post" novalidate data-validate>
      <label for="login">Логин</label>
      <input id="login" name="login" required
             pattern="[a-zA-Z0-9_.\\-]{3,20}"
             title="3&#8211;20 символов: буквы, цифры, _ . -"
             autocomplete="username">
      <span class="field-error"></span>

      <label for="full_name">ФИО</label>
      <input id="full_name" name="full_name" required autocomplete="name">
      <span class="field-error"></span>

      <label for="phone">Телефон</label>
      <input id="phone" name="phone" required
             pattern="\\+?[0-9\\-\\s]{10,15}"
             title="+7 999 000-00-00 или аналогичный формат">
      <span class="field-error"></span>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <span class="field-error"></span>

      <label for="password">Пароль</label>
      <input id="password" name="password" type="password"
             minlength="8" required autocomplete="new-password">
      <span class="field-error"></span>

      <button class="btn" type="submit" data-toast="Создаём аккаунт..."
              style="margin-top:16px;width:100%">
        Создать аккаунт
      </button>
    </form>
    <p style="margin-top:14px">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
  </div>
</div>
{% endblock %}
