{% extends "base.html" %}
{% set title = "Вход — Студия красоты" %}
{% block content %}
<div class="grid">
  <div class="col-12 card" style="max-width:460px;margin:0 auto">
    <h2 style="margin-top:0">Вход</h2>
    {% if error %}
      <p style="color:#ff8a8a;margin-top:0">&#9888; {{ error }}</p>
    {% endif %}
    <form method="post" novalidate data-validate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" required autocomplete="email">
      <span class="field-error"></span>

      <label for="password">Пароль</label>
      <input id="password" name="password" type="password"
             minlength="8" required autocomplete="current-password">
      <span class="field-error"></span>

      <button class="btn" type="submit" data-toast="Выполняется вход..."
              style="margin-top:16px;width:100%">
        Войти
      </button>
    </form>
    <p style="margin-top:14px">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
  </div>
</div>
{% endblock %}
